<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo en tu mejor momento Blu-ray HTML</title>
  <link rel="stylesheet" href="styles.css" />
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#000;overflow:hidden}.frame{width:min(100vw,160vh);box-shadow:none}</style>
</head>
<body>
  <main class="preview-stage frame" aria-label="Menú Blu-ray HTML">
    <div class="preview-bg" id="bg"></div>
    <video class="preview-video" id="video" autoplay loop muted playsinline></video>
    <div class="preview-texture" id="texture"></div>
    <div class="preview-overlay" id="overlay"></div>
    <div class="preview-content" id="content"></div>
    <audio id="music" loop></audio>
  </main>
  <script src="demo-en-tu-mejor-momento-blu-ray-html.config.js"></script>
  <script src="runtime.js"></script>
</body>
</html>
